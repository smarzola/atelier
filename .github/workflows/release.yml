name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin atelier
      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/atelier-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/atelier dist/atelier-${{ matrix.target }}/
          cp README.md LICENSE dist/atelier-${{ matrix.target }}/
          tar -C dist -czf dist/atelier-${{ matrix.target }}.tar.gz atelier-${{ matrix.target }}
      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/atelier-${{ matrix.target }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/atelier.exe dist/atelier-${{ matrix.target }}/
          Copy-Item README.md,LICENSE dist/atelier-${{ matrix.target }}/
          Compress-Archive -Path dist/atelier-${{ matrix.target }}/* -DestinationPath dist/atelier-${{ matrix.target }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atelier-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
